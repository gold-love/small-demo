version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: finsight-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finsight_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: finsight-backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=finsight_db
      - JWT_SECRET=${JWT_SECRET:-finsight_super_secret_key_change_me_in_production_1234567890}
      - NODE_ENV=production
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: finsight-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
