services:
  - type: web
    name: finsight-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: finsight-db
          property: connectionString

  - type: web
    name: finsight-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: finsight-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: finsight-db
    databaseName: finsight
    user: finsight_user
